<!DOCTYPE html>
<html lang="nb" class="bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studielån - Bør du binde renta?</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230c93e7'/><text x='50' y='38' text-anchor='middle' font-size='28' font-weight='bold' fill='white' font-family='system-ui'>LÅN</text><polyline points='15,75 35,60 55,65 75,45 85,50' fill='none' stroke='%2334d399' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='85' cy='50' r='4' fill='%2334d399'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }

        /* Fullscreen chart overlay */
        .chart-fullscreen {
            position: fixed !important;
            inset: 0 !important;
            z-index: 50 !important;
            margin: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            max-width: none !important;
            overflow-y: auto;
            padding: 1rem !important;
            background: #030712 !important;
        }
        .chart-fullscreen canvas {
            max-height: calc(100vh - 7rem);
        }
        .chart-expand-btn {
            display: none;
        }
        @media (max-width: 768px) {
            .chart-expand-btn {
                display: inline-flex;
            }
        }
    </style>
    <script>
        function toggleChartFullscreen(btn) {
            const card = btn.closest('[data-chart-card]');
            if (!card) return;
            const isFs = card.classList.toggle('chart-fullscreen');
            btn.innerHTML = isFs
                ? '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"/></svg>';
            // Resize all charts within the card
            const canvases = card.querySelectorAll('canvas');
            canvases.forEach(c => {
                const chart = Chart.getChart(c);
                if (chart) {
                    chart.options.aspectRatio = isFs ? 1.2 : (chart._origAspectRatio || 2.5);
                    chart.resize();
                }
            });
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7ff', 100: '#e0effe', 200: '#bae0fd', 300: '#7cc8fb', 400: '#36adf6', 500: '#0c93e7', 600: '#0074c5', 700: '#015c9f', 800: '#064e83', 900: '#0b416d', 950: '#072a49' }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-950">
    <div class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
